<!--forgotten password -->

<div id="forgotten_password_pane" dojoType="dijit.Dialog" 
  execute="login_.reset_password(arguments[0]);"
	title="Reset Your ArabicReader Password">
	<div dojotype="dijit.layout.ContentPane">
		<div id="forgotten_password_pane_content">
			<table>
		        <tr>
			        <td colspan="2">
			          <p>
			          This will reset your password and send a new password to
			          your registered email address.
			          
			          You can then log on, go to My Reader, and change your password to one you prefer.
			          </p>
			        </td>
		        </tr>
		        <tr>
			        <td><label>User Name (Registered Email Address): </label>
			        </td>
	                <td>
	                	<input dojoType="dijit.form.TextBox"  id="forgotten_email"
	                		name="email_address">
	                	</input>
	                </td>
		        </tr>
		        <tr>
	                <td colspan="2" align="center">
	                     <button dojoType=dijit.form.Button type="submit">OK</button>
	                     <button dojoType=dijit.form.Button onclick="dijit.byId('forgotten_password_pane').hide();">Cancel</button>
	                </td>
		        </tr>
		    </table>
		</div>
	</div>
</div>
