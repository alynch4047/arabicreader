<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN"
            "http://www.w3.org/TR/html4/strict.dtd">
<html>
  <head>
  	<META http-equiv="Content-Type" content="text/html; charset=utf-8">
  	
    <title>Arabic Reader</title>
    
    <style type="text/css">
    	@import "dojo/dijit/themes/soria/soria.css";
    	@import "dojo/dojox/layout/resources/FloatingPane.css";	
	    @import "dojo/dojox/layout/resources/ResizeHandle.css";
        @import "arabic_reader.css";
    </style>
    
    <link rel="shortcut icon" href="images/favicon.png" type="image/png"></link>

    <script type="text/javascript"
            src="dojo/dojo/dojo.js"
	        djConfig="parseOnLoad: true, usePlainJson: true, preventBackButtonFix: false">
    </script>
    
	    <script type="text/javascript" src="init_ar.js"></script>
    <script type="text/javascript" src="preferences_manager.js"></script>
    <script type="text/javascript" src="font_manager.js"></script>
    <script type="text/javascript" src="db_navigate.js"></script>
    <script type="text/javascript" src="lookups.js"></script>
    <script type="text/javascript" src="upload.js"></script>
    <script type="text/javascript" src="arabic.js"></script>
    <script type="text/javascript" src="caret.js"></script>
    <script type="text/javascript" src="central_text.js"></script>
    <script type="text/javascript" src="html_maker.js"></script>
    <script type="text/javascript" src="mode.js"></script>
    <script type="text/javascript" src="navigate.js"></script>
    <script type="text/javascript" src="network.js"></script>
    <script type="text/javascript" src="new_definition.js"></script>
    <script type="text/javascript" src="root.js"></script>
    <script type="text/javascript" src="rounded.js"></script>
    <script type="text/javascript" src="virtual_keyboard.js"></script>
    <script type="text/javascript" src="vocab.js"></script>
    <script type="text/javascript" src="word_meaning.js"></script>
    <script type="text/javascript" src="about.js"></script>
    <script type="text/javascript" src="login.js"></script>
    <script type="text/javascript" src="cookies.js"></script>
    <script type="text/javascript" src="main_menu.js"></script>
    <script type="text/javascript" src="library.js"></script>
    <script type="text/javascript" src="dynamic_css.js"></script>
    <script type="text/javascript" src="db_data_form_row.js"></script>
    <script type="text/javascript" src="db_data_form.js"></script>
    <script type="text/javascript" src="my_reader.js"></script>
    <script type="text/javascript" src="word_set.js"></script>
    <script type="text/javascript" src="webtoolkit.aim.js"></script>
    <script type="text/javascript" src="md5.js"></script>
    <script type="text/javascript" src="translator.js"></script>
    <script type="text/javascript" src="utils.js"></script>
    <script type="text/javascript" src="status.js"></script>
    <script type="text/javascript" src="data.js"></script>
    <script type="text/javascript" src="revise.js"></script>
    <script type="text/javascript" src="organise_vocab.js"></script>

    <script type="text/javascript" src="ff_extension.js"></script>
    
    <script type="text/javascript">
    	          dojo.registerModulePath("arabic_reader_widgets",
                    "../../arabic_reader_widgets");
          dojo.require("dojo.cookie");
          dojo.require("dojo.data.ItemFileReadStore");
          dojo.require("dojo.back");
          dojo.require("dijit.form.Form");
          dojo.require("dijit.form.Button");
          dojo.require("dijit.form.FilteringSelect");
          dojo.require("dijit.form.TextBox");
          dojo.require("dijit.form.ComboBox");
          dojo.require("dijit.form.CheckBox");
          dojo.require("dijit.layout.ContentPane");
          dojo.require("dijit.TitlePane");
          dojo.require("dijit.layout.BorderContainer");
          dojo.require("dijit.Tooltip");
          dojo.require("dijit.Dialog");
          dojo.require("dijit.ColorPalette");
          dojo.require("dojox.layout.FloatingPane");
          dojo.require("dojo.parser");
          dojo.require("arabic_reader_widgets.Tooltip");

    	dojo.addOnLoad(init_ff_extension);
    </script>
    
  </head>
  
  <body class='soria'>
  
        <!-- ff extension header -->
    <!-- div id="my-div-extra" onmyevent="alert('Somebody pressed a button for ' +elm.id +'\n' +myextra);"-->
    <div id="my-div-extra" onmyevent="word_meaning.get_meanings_for_word(myextra);">
    </div> 

  
   	       <div dojoType="dijit.layout.ContentPane" region="left" splitter="true" id="main_left_pane">
          <!-- word meaning panel -->
          <div dojoType="dijit.TitlePane"  id='word_meaning_pane' title="Possible Word Meanings">
             
               <div class='word_meaning_section' id='word_meaning'>
               </div>    
               
               <div id='no_meaning_found_header'>
                 <div id='no_meaning_found_message'>
                 </div>
                 <div id='add_new_word'>Add Definition
                 </div>
               </div>        
                     
          </div>
          <!-- root panel -->
          <div dojoType="dijit.layout.ContentPane" id='root_words_pane' >
            
               <div id="root_banner" >
                   <div id='root_text' dojoType="dijit.TitlePane" title="Word Root">
                   </div>    
               </div>             
            
          </div>
          <!-- vocab summary panel -->
          <div dojoType="dijit.layout.ContentPane" id='vocab_pane' >
             
               <div id='vocabulary_title_wrapper'>
                   <div dojoType='dijit.TitlePane' id="vocabulary_text" title="Recent Vocabulary">
                   </div>
               </div>              
          </div>
          <!-- status panel -->
          <div dojoType="dijit.layout.ContentPane" id='status_pane' >
             
               <div id='status_title_wrapper'>
                   <div dojoType='dijit.TitlePane'  title="Status">
                       <div id="status_events"></div>
                   </div>
               </div>              
          </div>
              <!--status - error report -->
           <div id="status_error_pane" dojoType="dijit.Dialog" 
               execute="status_.error_pane_closed();"
               title="View Error Details">
               <div dojotype="dijit.layout.ContentPane">
                   <div id="status_error_pane_content">
                       <table>
                           <tr  colspan="2">
                               <td>
                                 <p id='status_error_name'>
                                 </p>
                               </td>
                           </tr>
                             <tr>
                               <td colspan="2">
                                 <p id='status_error_message'>
                                 </p>
                               </td>
                           </tr>
                           <tr>
                               <td colspan="2" align="center">
                                    <button dojoType=dijit.form.Button type="submit">OK</button>
                               </td>
                           </tr>
                       </table>
                   </div>
               </div>
           </div>
       </div>

   
   </body>
   
</html>
